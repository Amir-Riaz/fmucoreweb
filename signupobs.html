<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Observer Registration — FMU CORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Poppins', 'sans-serif'],
          display: ['Anton', 'sans-serif'],
          mark: ['Bebas Neue', 'sans-serif']
        },
        colors: {
          brand: {
            50: '#EAF3F4', 100: '#D2E6E9', 200: '#A6CDD3', 300: '#7AB3BE',
            400: '#4E9AA9', 500: '#2F7E8F', 600: '#236E81', 700: '#185262',
            800: '#0F3A47', 900: '#00354F'
          },
          lime: '#CEFF99',
          paper: '#F6FAF7'
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-paper font-sans text-slate-800 antialiased">

  <div class="min-h-screen flex flex-col">

    <!-- Brand header strip -->
    <header class="w-full py-5 px-6 flex items-center justify-center sm:justify-start sm:px-10">
      <a href="index.html" class="flex items-center gap-2">
        <span class="font-mark text-xl text-brand-900 tracking-widest">FMU</span>
        <span class="font-display text-xl text-brand-600 leading-none">CORE</span>
      </a>
    </header>

    <!-- Main content -->
    <main class="flex-1 flex items-center justify-center px-4 pb-10">
      <div class="w-full max-w-md">

        <div class="bg-white/90 backdrop-blur border border-slate-200 shadow-xl shadow-brand-900/5 rounded-2xl p-6 sm:p-8">

          <!-- change this block -->
<div class="mb-6 text-center">
  <p class="font-mark tracking-widest text-brand-600 text-xs mb-2">FMU CORE 2026</p>
  <h1 class="font-display text-2xl text-brand-900">REGISTER AS OBSERVER/ATTENDEE</h1>
  <p class="text-sm text-slate-500 mt-1.5">Create your account to attend FMU CORE 2026</p>
</div>
          <!-- Alert box -->
          <div id="alertBox" class="hidden"></div>

          <form id="signupForm" class="space-y-4" novalidate>

            <div>
              <label for="fullName" class="block text-sm font-medium text-slate-700 mb-1.5">Full Name</label>
              <input
                type="text" id="fullName" name="fullName" required autocomplete="name"
                placeholder="e.g. Amir Khan"
                class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-sm"
              />
              <p class="text-xs text-red-500 mt-1 hidden field-error" data-for="fullName"></p>
            </div>

            <div>
              <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
              <input
                type="email" id="email" name="email" required autocomplete="email"
                placeholder="you@example.com"
                class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-sm"
              />
              <p class="text-xs text-red-500 mt-1 hidden field-error" data-for="email"></p>
            </div>

            <div>
              <label for="phone" class="block text-sm font-medium text-slate-700 mb-1.5">Phone Number</label>
              <input
                type="tel" id="phone" name="phone" required autocomplete="tel"
                placeholder="+92 300 1234567"
                class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-sm"
              />
              <p class="text-xs text-red-500 mt-1 hidden field-error" data-for="phone"></p>
            </div>

            <div>
  <label for="cnic" class="block text-sm font-medium text-slate-700 mb-1.5">
    CNIC
  </label>
  <input
    type="text"
    id="cnic"
    name="cnic"
    required
    inputmode="numeric"
    maxlength="15"
    placeholder="33402-0444495-5"
    class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-sm"
  />
  <p class="text-xs text-red-500 mt-1 hidden field-error" data-for="cnic"></p>
</div>

            <div>
              <label for="organization" class="block text-sm font-medium text-slate-700 mb-1.5">Institution / Organization</label>
              <input
                type="text" id="organization" name="organization" required autocomplete="organization"
                placeholder="e.g. King Edward Medical University"
                class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-sm"
              />
              <p class="text-xs text-red-500 mt-1 hidden field-error" data-for="organization"></p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                <input
                  type="password" id="password" name="password" required autocomplete="new-password"
                  placeholder="Min. 6 characters"
                  class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-sm"
                />
                <p class="text-xs text-red-500 mt-1 hidden field-error" data-for="password"></p>
              </div>
              <div>
                <label for="confirmPassword" class="block text-sm font-medium text-slate-700 mb-1.5">Confirm Password</label>
                <input
                  type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password"
                  placeholder="Re-enter password"
                  class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-sm"
                />
                <p class="text-xs text-red-500 mt-1 hidden field-error" data-for="confirmPassword"></p>
              </div>
            </div>

            <!-- change the submit button label -->
<button
  type="submit" id="submitBtn"
  class="w-full mt-2 bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-mark tracking-widest py-2.5 rounded-lg transition shadow-lg shadow-brand-600/25 text-sm"
>
  CONTINUE TO REGISTRATION
</button>

          </form>

          <p class="text-center text-sm text-slate-500 mt-6">
            Already registered?
            <a href="login.html" class="text-brand-600 font-semibold hover:text-brand-700">Log in</a>
          </p>

        </div>

        <p class="text-center text-xs text-slate-400 mt-6">
          &copy; 2026 FMU CORE Conference. All rights reserved.
        </p>
      </div>
    </main>
  </div>

  <script type="module" src="js/signupobs.js"></script>
</body>
</html>
