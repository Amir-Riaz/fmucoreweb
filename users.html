<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMU CORE - Users</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:Poppins,sans-serif;
}
</style>

</head>
<body class="bg-slate-100">

<div class="max-w-7xl mx-auto p-6">

    <h1 class="text-3xl font-bold mb-6">
        Registered Users
    </h1>

    <div class="bg-white rounded-xl shadow overflow-x-auto">

        <table class="min-w-full text-sm">

            <thead class="bg-slate-800 text-white">

                <tr>
                    <th class="px-4 py-3 text-left">#</th>
                    <th class="px-4 py-3 text-left">Name</th>
                    <th class="px-4 py-3 text-left">Email</th>
                    <th class="px-4 py-3 text-left">Phone</th>
                    <th class="px-4 py-3 text-left">CNIC</th>
                    <th class="px-4 py-3 text-left">Organization</th>
                    <th class="px-4 py-3 text-left">Role</th>
                    <th class="px-4 py-3 text-left">Status</th>
                    <th class="px-4 py-3 text-left">Serial</th>
                    <th class="px-4 py-3 text-left">Created</th>
                    <th class="px-4 py-3 text-left">UID</th>
                </tr>

            </thead>

            <tbody id="usersTable">

                <tr>
                    <td colspan="11" class="text-center py-8 text-slate-500">
                        Loading users...
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<script type="module" src="js/users.js"></script>

</body>
</html>
