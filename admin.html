<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — FMUCORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        colors: {
          brand: {
            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
            800: '#3730a3', 900: '#312e81'
          }
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">

  <div id="topbar"></div>

  <div id="loadingState" class="max-w-7xl mx-auto px-4 sm:px-6 py-10 animate-pulse">
    <div class="h-8 w-64 bg-slate-200 rounded mb-8"></div>
    <div class="h-96 bg-slate-200 rounded-2xl"></div>
  </div>

  <main id="content" class="hidden max-w-7xl mx-auto px-4 sm:px-6 py-8">

    <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-extrabold text-slate-900">Participant Management</h1>
        <p class="text-slate-500 text-sm mt-1">
          <span id="totalCount">0</span> registered participants
        </p>
      </div>

      <div class="flex flex-col sm:flex-row gap-2">
        <input
          id="searchInput" type="text" placeholder="Search by name or email..."
          class="px-3.5 py-2 rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-sm w-full sm:w-72"
        />
        <select id="statusFilter" class="px-3.5 py-2 rounded-lg border border-slate-300 focus:border-brand-500 outline-none transition text-sm bg-white">
          <option value="all">All statuses</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="blocked">Blocked</option>
        </select>
        <select id="cpackFilter" class="px-3.5 py-2 rounded-lg border border-slate-300 focus:border-brand-500 outline-none transition text-sm bg-white">
          <option value="all">All Cpack</option>
          <option value="issued">Cpack Issued</option>
          <option value="not_issued">Cpack Not Issued</option>
        </select>
        <a href="abstracts.html" class="inline-flex items-center justify-center gap-2 px-3.5 py-2 rounded-lg bg-brand-600 text-white text-sm font-bold hover:bg-brand-700 transition whitespace-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
          Manage Abstracts
        </a>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 border-b border-slate-200">
            <tr class="text-left text-slate-500 text-xs uppercase tracking-wider">
              <th class="px-4 py-3 font-semibold">Name</th>
              <th class="px-4 py-3 font-semibold">CNIC</th>
              <th class="px-4 py-3 font-semibold">Email</th>
              <th class="px-4 py-3 font-semibold hidden md:table-cell">Organization</th>
              <th class="px-4 py-3 font-semibold">Status</th>
              <th class="px-4 py-3 font-semibold text-center">Cpack</th>
              <th class="px-4 py-3 font-semibold text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody" class="divide-y divide-slate-100">
            <!-- rows injected by admin.js -->
          </tbody>
        </table>
      </div>

      <div id="emptyState" class="hidden py-16 text-center text-slate-400 text-sm">
        No participants match your search.
      </div>
    </div>

    <!-- Pagination -->
    <div class="flex items-center justify-between mt-5 text-sm">
      <p class="text-slate-500">
        Showing <span id="rangeStart">0</span>–<span id="rangeEnd">0</span> of <span id="filteredCount">0</span>
      </p>
      <div class="flex items-center gap-2">
        <button id="prevPageBtn" class="px-3 py-1.5 rounded-lg border border-slate-300 hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition">
          Prev
        </button>
        <span id="pageIndicator" class="text-slate-600 font-medium px-1">1 / 1</span>
        <button id="nextPageBtn" class="px-3 py-1.5 rounded-lg border border-slate-300 hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition">
          Next
        </button>
      </div>
    </div>

  </main>
<!-- Permissions Modal -->
<div id="permissionsModal"
     class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40">

  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">

    <h2 class="text-xl font-bold mb-4">
      Special Account Permissions
    </h2>

    <p id="permUserName" class="text-sm text-slate-500 mb-5"></p>

    <div class="space-y-3">

      <label class="flex items-center gap-3">
        <input type="checkbox" id="permStudrwr">
        <span>Student Reviewer</span>
      </label>

      <label class="flex items-center gap-3">
        <input type="checkbox" id="permFacrwr">
        <span>Faculty Reviewer</span>
      </label>

      <label class="flex items-center gap-3">
        <input type="checkbox" id="permEnrolmngr">
        <span>Enrollment Manager</span>
      </label>

      <label class="flex items-center gap-3">
        <input type="checkbox" id="permRwrset">
        <span>Reviewer Manager</span>
      </label>

    </div>

    <div class="flex justify-end gap-3 mt-6">

      <button
        id="cancelPermissions"
        class="px-4 py-2 rounded-lg border">
        Cancel
      </button>

      <button
        id="savePermissions"
        class="px-4 py-2 rounded-lg bg-brand-600 text-white">
        Save
      </button>

    </div>

  </div>

</div>
  <!-- Toast for action feedback -->
  <div id="toast" class="hidden fixed bottom-5 right-5 z-50 max-w-xs px-4 py-3 rounded-lg shadow-lg text-sm font-medium"></div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
