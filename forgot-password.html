<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password — FMU CORE 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-10">

  <div class="w-full max-w-md">
    <!-- Logo / Header -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900">FMU CORE 2026</h1>
      <p class="text-sm text-gray-500 mt-1">Faisalabad Medical University</p>
    </div>

    <div class="bg-white shadow-sm border border-gray-100 rounded-2xl p-8">
      <h2 class="text-lg font-semibold text-gray-900 mb-1">Forgot your password?</h2>
      <p class="text-sm text-gray-500 mb-6">
        Enter the email associated with your account and we'll send you a link to reset your password.
      </p>

      <div id="alertBox" class="hidden"></div>

      <form id="forgotForm" novalidate>
        <div class="mb-5">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            class="w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
          />
          <p class="field-error hidden text-xs text-red-600 mt-1" data-for="email"></p>
        </div>

        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg py-2.5 transition disabled:opacity-60 disabled:cursor-not-allowed"
        >
          Send reset link
        </button>
      </form>

      <p class="text-sm text-gray-500 text-center mt-6">
        Remembered your password?
        <a href="login.html" class="text-blue-600 font-medium hover:underline">Back to login</a>
      </p>
    </div>
  </div>

  <script type="module" src="js/forgot-password.js"></script>
</body>
</html>
